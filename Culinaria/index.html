<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinária</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="imagens/simbolo_origenes.jpg" type="image/jpg">
</head>
<body>

    <header>
        <h1>Lista de Receitas</h1>
        <img src="imagens/simbolo_origenes.jpg" alt="Logo da escola" class="logo">
    </header>

    <main class="receitas-container">

        <article class="card-receita">
            <h2>Bolo de chocolate</h2>
            <img src="imagens/bolo_chocolate.jpg" alt="Bolo de chocolate">

            <div class="info-receita">
                <p><strong>Tempo de preparo:</strong> 50 minutos</p>
                <p><strong>Tipo de receita:</strong> Sobremesa</p>
            </div>

            <a href="bolo.html" class="btn-receita">Ver receita</a>
        </article>

        <article class="card-receita">
            <h2>Brigadeiro</h2>
            <img src="imagens/brigadeiro.jpg" alt="Brigadeiro">

            <div class="info-receita">
                <p><strong>Tempo de preparo:</strong> 25 minutos</p>
                <p><strong>Tipo de receita:</strong> Sobremesa</p>
            </div>

            <a href="brigadeiro.html" class="btn-receita">Ver receita</a>
        </article>

        <article class="card-receita">
            <h2>Torta de frango</h2>
            <img src="imagens/torta_de_frango.jpg" alt="Torta de frango">

            <div class="info-receita">
                <p><strong>Tempo de preparo:</strong> 1 hora</p>
                <p><strong>Tipo de receita:</strong> Salgado</p>
            </div>

            <a href="torta.html" class="btn-receita">Ver receita</a>
        </article>

    </main>

    <footer>
        GM Bakers
        <img src="imagens/simbolo_origenes.jpg" alt="Logo da escola" class="logo-footer">
    </footer>

</body>
</html>
