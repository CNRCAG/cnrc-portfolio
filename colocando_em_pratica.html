<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manipulação do DOM</title>
</head>
<body>

  <p id="meu-paragrafo">Texto original</p>
  <button id="meu-botao">Alterar texto</button>

  <script>
    const paragrafo = document.getElementById("meu-paragrafo");
    const botao = document.getElementById("meu-botao");

    botao.addEventListener("click", function() {
      paragrafo.textContent = "Texto alterado!";
    });
  </script>

</body>
</html>
